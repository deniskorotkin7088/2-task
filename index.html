<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <script defer src="js/vue.js"></script>
    <script defer src="js/main.js"></script>
    <title>Notes App</title>
</head>
<body>
    <div id="app">
    <h1>Мои заметки</h1>
    <div v-if="isColumn1Blocked" class="blocked-message">
         Колонка 1 заблокирована (колонка 2 переполнена)
    </div>
    <div class="columns">
        <div class="column">
            <h2>
                Колонка 1 ({{ column1.length }}/3)
                <span v-if="isColumn1Blocked" class="blocked-icon"></span>
            </h2>
            <div class="cards" :class="{ 'blocked': isColumn1Blocked }">
                <note-card
                    v-for="card in column1"
                    :key="card.id"
                    :card="card"
                    @update="handleUpdate">
                </note-card>
            </div>
            <button 
                v-if="column1.length < 3" 
                @click="addCard(1)" 
                class="add-btn">
                + Добавить карточку
            </button>
        </div>
        <div class="column">
            <h2>Колонка 2 ({{ column2.length }}/5)</h2>
            <div class="cards">
                <note-card
                    v-for="card in column2"
                    :key="card.id"
                    :card="card"
                    @update="handleUpdate">
                </note-card>
            </div>
            <button 
                v-if="column2.length < 5" 
                @click="addCard(2)" 
                class="add-btn">
                + Добавить карточку
            </button>
        </div>
        <div class="column">
            <h2>Колонка 3</h2>
            <div class="cards">
                <note-card
                    v-for="card in column3"
                    :key="card.id"
                    :card="card"
                    @update="handleUpdate">
                </note-card>
            </div>
            <button @click="addCard(3)" class="add-btn">
                + Добавить карточку
            </button>
        </div>
    </div>
</div>
</body>
</html>

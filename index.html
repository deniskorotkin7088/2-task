<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <script defer src="js/vue.js"></script>
    <script defer src="js/main.js"></script>
    <title>Notes App</title>
</head>
<body>
    <div id="app">
    <h1>Мои заметки</h1>
    
    <div class="columns">
        <!-- Колонка 1 -->
        <div class="column">
            <h2>Колонка 1 ({{ column1.length }}/3)</h2>
            <div class="cards">
                <note-card
                    v-for="card in column1"
                    :key="card.id"
                    :card="card">
                </note-card>
            </div>
        </div>
        
        <!-- Колонка 2 -->
        <div class="column">
            <h2>Колонка 2 ({{ column2.length }}/5)</h2>
            <div class="cards">
                <note-card
                    v-for="card in column2"
                    :key="card.id"
                    :card="card">
                </note-card>
            </div>
        </div>
        
        <!-- Колонка 3 -->
        <div class="column">
            <h2>Колонка 3</h2>
            <div class="cards">
                <note-card
                    v-for="card in column3"
                    :key="card.id"
                    :card="card">
                </note-card>
            </div>
        </div>
    </div>
</div>
</body>
</html>

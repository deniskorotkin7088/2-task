<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <script defer src="js/vue.js"></script>
    <script defer src="js/main.js"></script>
    <title>Notes App</title>
</head>
<body>
    <div id="app">
        <h1>Мои заметки</h1>
        <div class="columns">
             <h2>
                Колонка 1 
                <span class="count">{{ column1.length }}/3</span>
            </h2>
            <div class="cards">
                <note-card
                    v-for="card in column1"
                    :key="card.id"
                    :card="card">
                </note-card>
                <div v-if="column1.length === 0" class="empty-message">
                    Нет карточек
                </div>
            </div>
            <button 
                v-if="column1.length < 3" 
                @click="addCard(1)" 
                class="add-btn">
                + Добавить карточку
            </button>
        </div>
        <div class="column">
            <h2>
                Колонка 2 
                <span class="count">{{ column2.length }}/5</span>
            </h2>
            <div class="cards">
                <note-card
                    v-for="card in column2"
                    :key="card.id"
                    :card="card">
                </note-card>
                <div v-if="column2.length === 0" class="empty-message">
                    Нет карточек
                </div>
            </div>
            <button 
                v-if="column2.length < 5" 
                @click="addCard(2)" 
                class="add-btn">
                + Добавить карточку
            </button>
        </div>
        <div class="column">
            <h2>Колонка 3</h2>
            <div class="cards">
                <note-card
                    v-for="card in column3"
                    :key="card.id"
                    :card="card">
                </note-card>
                <div v-if="column3.length === 0" class="empty-message">
                    Нет карточек
                </div>
            </div>
            <button @click="addCard(3)" class="add-btn">
                + Добавить карточку
            </button>
        </div>
        </div>
    </div>
</body>
</html>
